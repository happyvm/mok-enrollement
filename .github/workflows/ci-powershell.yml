name: PowerShell CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install test dependencies
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -Scope CurrentUser -Force -SkipPublisherCheck
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run unit tests (Pester)
        shell: pwsh
        run: Invoke-Pester -Path ./tests -CI

      - name: Run static analysis (PSScriptAnalyzer)
        if: always()
        shell: pwsh
        run: Invoke-ScriptAnalyzer -Path './Invoke-MokDerEnrollment.ps1','./Invoke-MokDerEnrollment-HyperV.ps1','./tests' -Settings ./PSScriptAnalyzerSettings.psd1 -Recurse -EnableExit
